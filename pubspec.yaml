name: photogpt
description: Stop Googling. Just point your camera — AI answers everything instantly.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  image_picker: ^1.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.4
  device_info_plus: ^10.1.2
  image: ^4.2.0
  url_launcher: ^6.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
