services:
  - type: web
    name: photogpt-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    envVars:
      - key: GROQ_API_KEY
        sync: false        # paste your key in Render dashboard
      - key: RATE_LIMIT
        value: "5"
